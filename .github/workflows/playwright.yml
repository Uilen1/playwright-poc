name: Playwright Tests

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Execute Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      report-ready: ${{ steps.report-check.outputs.exists }}

    env:
      BASE_URL: https://www.saucedemo.com
      STANDARD_USER: standard_user
      STANDARD_PASSWORD: secret_sauce

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Validate TypeScript
        run: npm run typecheck

      - name: Execute lint
        run: npm run lint

      - name: Execute Playwright tests
        id: playwright-tests
        continue-on-error: true
        run: npm test

      - name: Check whether HTML report was generated
        id: report-check
        if: always()
        shell: bash
        run: |
          if [ -f "playwright-report/index.html" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Playwright HTML report was generated."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Playwright HTML report was not generated."
          fi

      - name: Add execution summary
        if: always()
        shell: bash
        run: |
          echo "# Playwright Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Information | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | \`${{ github.repository }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workflow run | \`${{ github.run_number }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test result | \`${{ steps.playwright-tests.outcome }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Report generated | \`${{ steps.report-check.outputs.exists }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ github.event_name }}" = "push" ] && \
             [ "${{ github.ref }}" = "refs/heads/master" ] && \
             [ "${{ steps.report-check.outputs.exists }}" = "true" ]; then
            echo "The HTML report will be published to GitHub Pages." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Reports from Pull Requests are stored only as workflow artifacts." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Playwright HTML report
        if: always() && steps.report-check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14
          if-no-files-found: error

      - name: Upload test evidence
        if: always() && steps.report-check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 14
          if-no-files-found: ignore

      - name: Validate Playwright result
        if: steps.playwright-tests.outcome == 'failure'
        shell: bash
        run: |
          echo "One or more Playwright tests failed."
          exit 1

  prepare-pages:
    name: Prepare Playwright report for GitHub Pages
    needs:
      - test

    if: >
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.test.outputs.report-ready == 'true'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Download Playwright HTML report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

  deploy-report:
    name: Publish Playwright report
    needs:
      - test
      - prepare-pages

    if: >
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      needs.test.outputs.report-ready == 'true' &&
      needs.prepare-pages.result == 'success'

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
      - name: Deploy report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add published report URL to summary
        shell: bash
        run: |
          echo "# Published Playwright Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open the latest Playwright HTML report](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"